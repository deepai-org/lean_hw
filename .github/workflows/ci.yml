name: CI
on: [push, pull_request]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Lean
        uses: leanprover/lean-action@v1
        with:
          auto-config: false
      - name: Repository quality checks
        run: bash scripts/quality.sh
      - name: Build + audit gate
        run: bash scripts/ci.sh
      - name: Recheck the headline refinement module
        run: lake env leanchecker Machines.Lnp64u.Theorems.RMC
